name: 'ZelC Kinetic Engine'
description: 'Run Rocheston ZelC playbooks for supply-chain integrity, SBOM generation, and immutable evidence.'
author: 'Rocheston'
branding:
  icon: 'shield'
  color: 'orange'

inputs:
  playbook:
    description: 'Path to the .zelc or .zc playbook'
    required: true
  api_key:
    description: 'Zelfire API Key for the Kinetic Engine (Optional)'
    required: false

runs:
  using: 'docker'
  # GitHub Actions requires this exact 'docker://' formatting, no "pull" command!
  image: 'docker://rocheston/zelc:latest'
  env:
    # This securely passes the optional key to your container if a user provides it
    ZELFIRE_API_KEY: ${{ inputs.api_key }}
  args:
    - run
    - ${{ inputs.playbook }}
